<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="dashboard" aria-labelledby="page-title">
        <div class="refresh-status" id="refresh-status" role="status" aria-live="polite" hidden>
          <span class="refresh-spinner" aria-hidden="true"></span>
          <span>Loading</span>
        </div>
        <div class="provider-grid" aria-label="LLM provider usage panels" id="provider-grid"></div>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
