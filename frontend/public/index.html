<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ABAP LLM Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="dashboard" aria-labelledby="page-title">
        <div class="provider-grid" aria-label="LLM provider usage panels" id="provider-grid"></div>
      </section>
    </main>
    <script id="metrics-data" type="application/json">
      [
        {
          "id": "codex",
          "name": "Codex",
          "metrics": [
            {
              "label": "5 hour usage limit",
              "value": "58%",
              "detail": "remaining",
              "reset": "Resets 12:52 PM",
              "meter": {
                "percent": 58,
                "level": "medium"
              },
              "ariaLabel": "Codex 5 hour usage limit 58 percent remaining"
            },
            {
              "label": "Weekly usage limit",
              "value": "74%",
              "detail": "remaining",
              "reset": "Resets Monday",
              "meter": {
                "percent": 74,
                "level": "high"
              },
              "ariaLabel": "Codex weekly usage limit 74 percent remaining"
            }
          ]
        },
        {
          "id": "copilot",
          "name": "GitHub Copilot",
          "metrics": [
            {
              "label": "Monthly credits",
              "value": "6,580 / 25,000",
              "detail": "used / total",
              "reset": "Resets July 1, 12:00 AM",
              "meter": {
                "percent": 74,
                "level": "high"
              },
              "ariaLabel": "Copilot monthly credits 6580 used of 25000 total, resets July 1 at 12:00 AM"
            }
          ]
        },
        {
          "id": "claude",
          "name": "Claude Code",
          "metrics": [
            {
              "label": "5 hour usage limit",
              "value": "42%",
              "detail": "remaining",
              "reset": "Resets 1:20 PM",
              "meter": {
                "percent": 42,
                "level": "low"
              },
              "ariaLabel": "Claude Code 5 hour usage limit 42 percent remaining"
            },
            {
              "label": "Weekly usage limit",
              "value": "63%",
              "detail": "remaining",
              "reset": "Resets Monday",
              "meter": {
                "percent": 63,
                "level": "medium"
              },
              "ariaLabel": "Claude Code weekly usage limit 63 percent remaining"
            }
          ]
        },
        {
          "id": "openrouter",
          "name": "OpenRouter",
          "metrics": [
            {
              "label": "Account balance",
              "value": "$12.40",
              "detail": "remaining",
              "ariaLabel": "OpenRouter account balance 12 dollars 40 cents remaining"
            }
          ]
        }
      ]
    </script>
    <script>
      const metricsData = JSON.parse(document.getElementById("metrics-data").textContent);
      const providerGrid = document.getElementById("provider-grid");

      function randomInteger(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function levelForPercent(percent) {
        if (percent < 50) {
          return "low";
        }

        if (percent < 70) {
          return "medium";
        }

        return "high";
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("en-US").format(value);
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("en-US", {
          currency: "USD",
          style: "currency"
        }).format(value);
      }

      function formatResetTime(date) {
        return new Intl.DateTimeFormat("en-US", {
          hour: "numeric",
          minute: "2-digit"
        }).format(date);
      }

      function randomResetTime() {
        const resetDate = new Date();
        resetDate.setMinutes(resetDate.getMinutes() + randomInteger(20, 300));
        return `Resets ${formatResetTime(resetDate)}`;
      }

      function randomizePercentMetric(provider, metric) {
        const percent = randomInteger(20, 95);

        return {
          ...metric,
          ariaLabel: `${provider.name} ${metric.label} ${percent} percent remaining`,
          meter: {
            ...metric.meter,
            level: levelForPercent(percent),
            percent
          },
          reset: metric.reset?.includes(":") ? randomResetTime() : metric.reset,
          value: `${percent}%`
        };
      }

      function randomizeCreditsMetric(metric) {
        const total = 25000;
        const used = randomInteger(1000, 23000);
        const remainingPercent = Math.round(((total - used) / total) * 100);

        return {
          ...metric,
          ariaLabel: `Copilot monthly credits ${used} used of ${total} total, ${metric.reset.toLowerCase()}`,
          meter: {
            ...metric.meter,
            level: levelForPercent(remainingPercent),
            percent: remainingPercent
          },
          value: `${formatNumber(used)} / ${formatNumber(total)}`
        };
      }

      function randomizeBalanceMetric(provider, metric) {
        const balance = randomInteger(250, 5000) / 100;
        const dollars = Math.floor(balance);
        const cents = Math.round((balance - dollars) * 100);

        return {
          ...metric,
          ariaLabel: `${provider.name} account balance ${dollars} dollars ${cents} cents remaining`,
          value: formatCurrency(balance)
        };
      }

      function randomizeMetric(provider, metric) {
        if (metric.label === "Monthly credits") {
          return randomizeCreditsMetric(metric);
        }

        if (metric.label === "Account balance") {
          return randomizeBalanceMetric(provider, metric);
        }

        if (metric.meter) {
          return randomizePercentMetric(provider, metric);
        }

        return metric;
      }

      function randomizeMetricsData(providers) {
        return providers.map((provider) => ({
          ...provider,
          metrics: provider.metrics.map((metric) => randomizeMetric(provider, metric))
        }));
      }

      function createElement(tagName, options = {}) {
        const element = document.createElement(tagName);

        if (options.className) {
          element.className = options.className;
        }

        if (options.textContent) {
          element.textContent = options.textContent;
        }

        return element;
      }

      function renderMeter(metric) {
        if (!metric.meter) {
          return null;
        }

        const meter = createElement("div", { className: "usage-meter" });
        const fill = createElement("span", { className: `meter-${metric.meter.level}` });
        fill.style.width = `${metric.meter.percent}%`;
        meter.append(fill);
        return meter;
      }

      function renderMetric(metric) {
        const block = createElement("section", { className: "limit-block" });
        block.setAttribute("aria-label", metric.ariaLabel);
        block.append(
          createElement("span", { className: "metric-label", textContent: metric.label }),
          createElement("strong", { textContent: metric.value }),
          createElement("span", { className: "limit-detail", textContent: metric.detail })
        );

        if (metric.reset) {
          block.append(createElement("span", { className: "reset-time", textContent: metric.reset }));
        }

        const meter = renderMeter(metric);

        if (meter) {
          block.append(meter);
        }

        return block;
      }

      function renderProvider(provider) {
        const card = createElement("article", { className: `provider-card ${provider.id}` });
        const header = createElement("header", { className: "provider-header" });
        const titleWrapper = createElement("div");
        titleWrapper.append(createElement("h2", { textContent: provider.name }));
        header.append(titleWrapper);

        const limitStack = createElement("div", { className: "limit-stack" });
        limitStack.append(...provider.metrics.map(renderMetric));

        card.append(header, limitStack);
        return card;
      }

      providerGrid.append(...randomizeMetricsData(metricsData).map(renderProvider));
    </script>
  </body>
</html>
