<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="dashboard" aria-labelledby="page-title">
        <div class="refresh-controls" aria-label="Refresh controls">
          <button class="refresh-button" id="refresh-button" type="button" aria-label="Refresh metrics">
            Refresh
          </button>
          <button class="refresh-button theme-toggle-button" id="theme-toggle-button" type="button" aria-label="Toggle dark mode" aria-pressed="false">
            Dark mode
          </button>
          <div class="refresh-status is-loading" id="refresh-status" role="status" aria-live="polite">
            <span class="refresh-spinner" aria-hidden="true"></span>
            <span class="refresh-status-text" id="refresh-status-text">Loading</span>
          </div>
        </div>
        <div class="provider-grid" aria-label="LLM provider usage panels" id="provider-grid"></div>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
